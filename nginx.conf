user                            root;
worker_processes                auto;

error_log                       /var/partto/nginx_error.log warn;
pid                             /var/run/nginx/nginx.pid;

events {
    worker_connections          1024;
}

http {
    include                     /etc/nginx/mime.types;
    default_type                application/octet-stream;
    sendfile                    on;
    access_log                  /var/partto/nginx_access.log;
    keepalive_timeout           3000;
    server {
        listen                  22222;
        root                    /opt/partto/project/parttofe/partto/build/;
        index                   index.html;
        server_name             localhost;
        client_max_body_size    32m;
        location /api {
            proxy_pass http://localhost:8000/;
        }
        location / {
            try_files $uri /opt/partto/project/parttofe/partto/build/index.html;
        }
    }
}